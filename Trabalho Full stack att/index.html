<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAC-MAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="intro.css">
</head>
<body>

  <div class="logo">PAC-MAN</div>
  <div class="subtitle">- NAMCO 1980 -</div>

  <div class="dot-divider">
    <div class="dp big"></div><div class="dp"></div><div class="dp"></div><div class="dp"></div>
    <div class="dp big"></div><div class="dp"></div><div class="dp"></div><div class="dp"></div>
    <div class="dp big"></div>
  </div>

  <!-- Pac-Man comendo bolinhas -->
  <canvas id="chaseCanvas" width="320" height="52"></canvas>

  <div class="dot-divider">
    <div class="dp"></div><div class="dp"></div><div class="dp"></div>
    <div class="dp big"></div><div class="dp"></div><div class="dp"></div><div class="dp"></div>
    <div class="dp big"></div><div class="dp"></div>
  </div>

  <!-- Tabela de pontuação -->
  <div class="points-table">
    <div class="points-row">
      <canvas id="dot1" width="14" height="14"></canvas>
      <span class="pts-label">10 PTS</span>
      <span class="pts-name">PONTO</span>
    </div>
    <div class="points-row">
      <canvas id="dot2" width="14" height="14"></canvas>
      <span class="pts-label">50 PTS</span>
      <span class="pts-name">POWER-UP</span>
    </div>
    <div class="points-row">
      <canvas id="cherry1" width="20" height="20"></canvas>
      <span class="pts-label">1000 PTS</span>
      <span class="pts-name">CEREJA</span>
    </div>
    <div class="points-row">
      <canvas id="bonus1" width="20" height="20"></canvas>
      <span class="pts-label">3500 PTS</span>
      <span class="pts-name">BONUS</span>
    </div>
  </div>

  <div class="press-enter" onclick="startGame()">PRESSIONE ENTER</div>

  <div class="credits">
    SAMUEL &nbsp;|&nbsp; FEI UNIVERSITY<br>
   ← → ↑ ↓ MOVER &nbsp;|&nbsp; ENTER PAUSAR
  </div>

  <script src="intro.js"></script>
</body>
</html>
