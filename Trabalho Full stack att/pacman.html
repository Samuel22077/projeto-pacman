<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <span>PONTOS: <b id="score">0</b></span>
    <span>VIDAS: <b id="lives">3</b></span>
    <span>NÍVEL: <b id="level">1</b></span>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="msg">Pressione ENTER para iniciar</div>
  <div id="controls">← → ↑ ↓ para mover | ENTER iniciar/pausar</div>

  <script src="game.js"></script>
</body>
</html>
